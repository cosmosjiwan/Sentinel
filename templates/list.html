<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문서별 검열 목록 — Sentinel</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/list.css') }}">
</head>
<body>

<div class="topbar">
  <a class="brand" href="/">Sentinel</a>
</div>

<div class="summary static">
  <div class="summary-top">
    <span class="summary-title">일괄 검열 완료</span>
  </div>
  <span class="summary-meta">{{ results|length }}개 문서의 위험성 평가가 완료되었습니다</span>
</div>

<div class="app-shell">
  <div class="batch-wrap">
    <div class="batch-list">
      {% for r in results %}
      <div class="batch-row">
        <div class="batch-row-main">
          <span class="batch-file-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 8.75 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/></svg>
          </span>
          <span class="batch-filename">{{ r.filename }}</span>
        </div>
        <div class="batch-row-meta">
          <span class="batch-score">민감성 점수 <strong>{{ r.risk.score }}</strong>/100</span>
          {% if r.blocked %}
            <span class="batch-blocked">차단됨 (공개 금지)</span>
          {% else %}
            <a class="btn btn-primary" href="/view/{{ r.filename }}">결과 보기</a>
          {% endif %}
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</div>

</body>
</html>
