<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일괄 검열 결과 — Sentinel</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body>

<div class="topbar">
  <a class="brand" href="/">Sentinel</a>
</div>

<div class="summary static">
  <div class="summary-top">
    <span class="summary-title">일괄 검열 완료</span>
  </div>
  <span class="summary-meta">{{ results|length }}개 문서의 위험성 평가가 완료되었습니다</span>
</div>

<div class="app-shell">
  <div class="batch-wrap">
    <div class="batch-list">
      {% for r in results %}
      <div class="batch-row">
        <div class="batch-row-main">
          <span class="batch-file-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 8.75 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/></svg>
          </span>
          <span class="batch-filename">{{ r.filename }}</span>
        </div>
        <div class="batch-row-meta">
          <span class="batch-score">민감성 점수 <strong>{{ r.risk.score }}</strong>/100</span>
          {% if r.blocked %}
            <span class="batch-blocked">차단됨 (공개 금지)</span>
          {% else %}
            <a class="btn btn-primary" href="/view/{{ r.filename }}">결과 보기</a>
          {% endif %}
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</div>

<style>
.batch-wrap { flex:1; padding: 24px; overflow-y:auto; }
.batch-list { display:flex; flex-direction:column; gap:10px; max-width: 760px; margin: 0 auto; }
.batch-row {
  display:flex; align-items:center; justify-content:space-between; gap: 14px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-card);
  box-shadow: var(--shadow2);
  padding:16px 20px;
  transition: box-shadow .15s, transform .1s;
}
.batch-row:hover { box-shadow: var(--shadow8); }
.batch-row-main { display:flex; align-items:center; gap:14px; min-width: 0; }
.batch-file-icon {
  width: 38px; height: 38px; flex-shrink: 0; border-radius: 10px;
  background: var(--accent-bg); color: var(--accent);
  display:flex; align-items:center; justify-content:center;
}
.batch-filename {
  font-size:14.5px; font-weight:700; color:var(--text);
  overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
}
.batch-row-meta { display:flex; align-items:center; gap:16px; flex-shrink: 0; }
.batch-score { font-size:13px; color:var(--muted); white-space: nowrap; }
.batch-score strong { font-size:16px; color: var(--text); font-weight: 800; }
.batch-blocked { font-size:12px; font-weight:700; color:var(--person); background: var(--person-bg); padding: 6px 12px; border-radius: 999px; }

@media (max-width: 768px) {
  .batch-wrap { padding: 16px; }
  .batch-row { flex-direction: column; align-items: flex-start; gap: 12px; }
  .batch-row-main { width: 100%; }
  .batch-row-meta { width: 100%; justify-content: space-between; }
}
</style>

</body>
</html>
