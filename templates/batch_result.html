<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일괄 검열 결과 — Sentinel</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body>

<div class="topbar">
  <div class="brand">Sentinel</div>
  <div class="topbar-right">
    <span class="chip">{{ results|length }}개 파일 처리</span>
    <a class="btn btn-secondary btn-sm" href="/">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M6.906.664a1.749 1.749 0 0 1 2.187 0l5.25 4.2c.415.332.657.835.657 1.367v7.019A1.75 1.75 0 0 1 13.25 15h-3.5a.75.75 0 0 1-.75-.75V9H7v5.25a.75.75 0 0 1-.75.75h-3.5A1.75 1.75 0 0 1 1 13.25V6.23c0-.531.242-1.034.657-1.366l5.25-4.2Z"/></svg>
      새 문서
    </a>
  </div>
</div>

<div class="summary">
  <span class="summary-title">일괄 검열 완료</span>
  <span class="summary-meta">{{ results|length }}개 문서의 위험성 평가가 완료되었습니다</span>
</div>

<div class="app-shell">
  <div class="batch-wrap">
    <div class="batch-list">
      {% for r in results %}
      <div class="batch-row">
        <div class="batch-row-main">
          <span class="grade-chip grade-{{ r.risk.grade }}">{{ r.risk.grade_label }}</span>
          <span class="batch-filename">{{ r.filename }}</span>
        </div>
        <div class="batch-row-meta">
          <span class="batch-score">민감성 점수 <strong>{{ r.risk.score }}</strong>/100</span>
          {% if r.blocked %}
            <span class="batch-blocked">차단됨 (공개 금지)</span>
          {% else %}
            <a class="btn btn-primary btn-sm" href="/view/{{ r.filename }}">결과 보기</a>
          {% endif %}
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</div>

<style>
.batch-wrap { flex:1; padding: 24px; overflow-y:auto; }
.batch-list { display:flex; flex-direction:column; gap:10px; max-width: 880px; margin: 0 auto; }
.batch-row {
  display:flex; align-items:center; justify-content:space-between;
  background: var(--surface); border:1px solid var(--border); border-radius: var(--r-card);
  box-shadow: var(--shadow2);
  padding:14px 18px;
}
.batch-row-main { display:flex; align-items:center; gap:12px; }
.batch-filename { font-size:13px; font-weight:600; color:var(--text); }
.batch-row-meta { display:flex; align-items:center; gap:14px; }
.batch-score { font-size:12px; color:var(--muted); }
.batch-score strong { color: var(--text); }
.batch-blocked { font-size:12px; font-weight:600; color:var(--person); }

@media (max-width: 768px) {
  .batch-wrap { padding: 16px; }
  .batch-row { flex-direction: column; align-items: flex-start; gap: 10px; }
  .batch-row-meta { width: 100%; justify-content: space-between; }
}
</style>

</body>
</html>
