<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinal DLP — AI 문서 보안 검열</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/input.css') }}">
</head>
<body>

<!-- 헤더 -->
<div class="topbar">
  <div class="brand">Sentinal<span>.</span>DLP</div>
  <div class="topbar-right">
    <span class="chip">Data Loss Prevention</span>
    <div class="topbar-user">
      <div class="topbar-avatar">관</div>
      <span class="topbar-username">관리자</span>
    </div>
  </div>
</div>

<!-- 콘텐츠 영역 -->
<div class="content-area">
  <div class="upload-hero">
    <div class="upload-hero-title">문서를 업로드하세요</div>
    <div class="upload-hero-sub">AI가 민감정보를 자동으로 탐지하고 비식별화합니다</div>

    <form action="/redact" method="post" enctype="multipart/form-data" id="uploadForm" style="width:100%">

      <div class="upload-box" id="dropArea">
        <div class="upload-icon">
          <svg width="28" height="28" viewBox="0 0 16 16" fill="currentColor">
            <path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 8.75 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/>
          </svg>
        </div>
        <div class="upload-title">파일을 끌어다 놓거나 선택하세요</div>
        <div class="upload-sub">PDF, DOCX, TXT, MD 파일 지원 · 여러 파일 동시 업로드(일괄 처리) 가능<br>최대 50MB</div>

        <input type="file" id="fileInput" name="file" accept=".pdf,.docx,.txt,.md" multiple required hidden>

        <button type="button" class="select-btn" onclick="document.getElementById('fileInput').click()">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 8.75 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/></svg>
          파일 선택
        </button>

        <div class="format-chips">
          <span class="fmt-chip">.pdf</span>
          <span class="fmt-chip">.docx</span>
          <span class="fmt-chip">.txt</span>
          <span class="fmt-chip">.md</span>
        </div>

        <div id="file-name">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/></svg>
          <span id="file-name-text"></span>
        </div>
      </div>

      <button class="submit-btn" type="submit" id="submitBtn" disabled style="margin-top:20px">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M9.504.43a1.516 1.516 0 0 1 2.437 1.713L10.415 5.5h2.123c1.57 0 2.346 1.909 1.22 3.004l-7.34 7.142a1.249 1.249 0 0 1-.871.354h-.302a1.25 1.25 0 0 1-1.157-1.723L5.633 10.5H3.462c-1.57 0-2.346-1.909-1.22-3.004L9.503.43Z"/></svg>
        검열 시작
      </button>

    </form>
  </div>
</div>

<!-- 로딩 오버레이 -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">
    <h3>문서 검열 중...</h3>
    <p>AI가 민감정보를 분석하고 있습니다</p>
  </div>
  <div class="loading-steps">
    <div class="step active" id="step1"><div class="step-dot"></div>문서 업로드 및 파싱</div>
    <div class="step" id="step2"><div class="step-dot"></div>민감정보 탐지 중</div>
    <div class="step" id="step3"><div class="step-dot"></div>비식별화 처리 중</div>
    <div class="step" id="step4"><div class="step-dot"></div>결과 문서 생성 중</div>
  </div>
</div>

<script>
const dropArea  = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');
const fileNameEl = document.getElementById('file-name');
const fileNameText = document.getElementById('file-name-text');
const submitBtn = document.getElementById('submitBtn');

function setFiles(fileList) {
  if (!fileList.length) return;
  fileNameText.textContent = fileList.length === 1
    ? fileList[0].name
    : `${fileList[0].name} 외 ${fileList.length - 1}개 (일괄 처리)`;
  fileNameEl.classList.add('show');
  dropArea.classList.add('has-file');
  submitBtn.disabled = false;
}

fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) setFiles(fileInput.files);
});

dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('dragover'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
dropArea.addEventListener('drop', e => {
  e.preventDefault();
  dropArea.classList.remove('dragover');
  if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; setFiles(e.dataTransfer.files); }
});

let stepIdx = 1;
let stepTimer;
function advanceStep() {
  if (stepIdx > 1) {
    document.getElementById('step' + (stepIdx - 1)).classList.remove('active');
    document.getElementById('step' + (stepIdx - 1)).classList.add('done');
  }
  if (stepIdx <= 4) {
    document.getElementById('step' + stepIdx).classList.add('active');
    stepIdx++;
    stepTimer = setTimeout(advanceStep, 3500);
  }
}

document.getElementById('uploadForm').addEventListener('submit', () => {
  document.getElementById('loading').classList.add('show');
  stepIdx = 1;
  advanceStep();
});
</script>
</body>
</html>
