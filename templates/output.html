<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>검열 결과 — Sentinel</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body>

<!-- 헤더 -->
<div class="topbar">
  <a class="brand" href="/">Sentinel</a>
</div>

<!-- 요약 스트립 -->
<div class="summary" id="summaryStrip">
  <div class="summary-top">
    <span class="summary-title">검열 완료</span>
  </div>
  {% if not blocked %}
  <div class="summary-detail">
    <span class="summary-meta" id="summaryMeta"></span>
    <div class="summary-grades" id="summaryGrades"></div>
    <button class="btn-download-sq" type="button" onclick="applyAndExport()" title="담당자 검토 후 승인됩니다 · Human-in-the-Loop" aria-label="검열본 다운로드">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/><path d="M7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.969a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.78a.749.749 0 1 1 1.06-1.06l1.97 1.969Z"/></svg>
    </button>
  </div>
  {% endif %}
</div>

<div class="app-shell">
{% if blocked %}
  <!-- 특급 등급: 공개 금지 차단 화면 -->
  <div class="blocked-state">
    <div class="blocked-icon">⛔</div>
    <h3>이 문서는 공개가 금지된 등급입니다</h3>
    <p>위험성 평가 결과 <strong>{{ risk.grade_label }}</strong>(민감성 점수 {{ risk.score }}/100)으로 분류되어,
    문서 내용 및 다운로드가 제공되지 않습니다. 보안 담당자에게 별도 승인을 요청하세요.</p>
  </div>
{% else %}

  <div class="panes">

    <!-- 문서 미리보기 -->
    <div class="doc-card">
      <div class="doc-head">
        <span class="doc-filename">{{ filename }}</span>
        <label class="toggle">
          원문 대조
          <input type="checkbox" id="revealToggle">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="doc-body" id="docBody"><div class="empty-state">파싱 중...</div></div>
    </div>

  </div>

  <!-- 탐지 패널: 검열본에서 단어를 클릭했을 때만 표시 (모바일: 바텀시트) -->
  <div class="panel-backdrop" id="panelBackdrop" onclick="closeReviewPanel()"></div>
  <div class="panel" id="reviewPanel">
    <div class="panel-handle"></div>
    <div class="panel-head">
      <span class="panel-head-title">탐지 항목</span>
      <button class="icon-btn panel-close-btn" type="button" onclick="closeReviewPanel()" aria-label="닫기">✕</button>
    </div>
    <div class="panel-list" id="detList"></div>
  </div>
{% endif %}
</div>

{% if not blocked %}
<script id="docBody-src" type="application/json">{{ body | tojson }}</script>
<script id="itemsData" type="application/json">{{ items | tojson }}</script>
<script id="reviewMeta" type="application/json">{{ filename | tojson }}</script>
<script>
const bodyText = JSON.parse(document.getElementById('docBody-src').textContent);
const items = JSON.parse(document.getElementById('itemsData').textContent);
const filename = JSON.parse(document.getElementById('reviewMeta').textContent);
const ITEM_GRADES = ["특급","1급","2급","3급"];
const MASK_TOKEN = {person:'[개인정보 마스킹]',org:'[기관정보 마스킹]',ip:'[기밀정보 마스킹]',auth:'[인증정보 마스킹]',secret:'[금융정보 마스킹]'};
const SUB_FALLBACK = {person:'[개인 비식별화]',org:'[기관명 비공개]',ip:'[기밀정보 비공개]',auth:'[인증정보 비공개]',secret:'[금융정보 비공개]'};

/* GPT가 실제로는 다른 표현으로 치환하지 않은 항목(원문==치환문)은, 치환 모드에서도 텍스트가 그대로 보여 변화가 없는 것처럼 보인다.
   이 경우 의미 있는 대체 표현으로 보정한다. */
function effectiveSubText(item) {
  if (item.subText && item.subText !== item.orig) return item.subText;
  return SUB_FALLBACK[item.type] || '[치환됨]';
}

/* 등급별 기본 검열 방식: 1급=마스킹, 2급=치환, 3급=공개 (양방향 고정 대응) */
const GRADE_METHOD = {'1급':'mask','2급':'substitute','3급':'publish'};
const METHOD_GRADE = {mask:'1급', substitute:'2급', publish:'3급'};
function inferMethod(item) {
  return GRADE_METHOD[item.grade] || 'substitute';
}

/* 본문의 <R번호>치환표현</R번호> 태그를 클릭 가능한 .ent 토큰으로 렌더 (mask=치환표현, orig=원문) */
const TAG_RE = /<R(\d+)>([\s\S]*?)<\/R\1>/g;
function renderDocument(text) {
  TAG_RE.lastIndex = 0;
  let html = text.replace(TAG_RE, (match, id, inner) => {
    const item = items[id];
    if (!item) return esc(inner);
    item.count = (item.count || 0) + 1;
    return `<span class="ent ent-${esc(item.grade)}" data-idx="${id}" onclick="selectItem(${id})">`
         + `<span class="ent-mask">${esc(inner)}</span>`
         + `<span class="ent-orig">${esc(item.orig)}</span></span>`;
  });
  return toParas(html);
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toParas(html) {
  html = html.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  return html.split('\n').map(l=>l.trim()).filter(l=>l.length>0).map(l=>`<p>${l}</p>`).join('');
}

/* ── 탐지 패널 렌더: 클릭된 항목 하나만 표시 ── */
function renderSingleItem(item, idx) {
  const list = document.getElementById('detList');
  list.innerHTML = `
    <div class="det active" data-idx="${idx}">
      <div class="det-top">
        <span class="grade-chip grade-${esc(item.grade)}">${esc(item.grade)}</span>
        <span class="det-score">${esc(item.score)}점</span>
      </div>
      <div class="det-compare">
        <div class="compare-row compare-before grade-${esc(item.grade)}">
          <span class="compare-label">검열 전</span>
          <span class="compare-val" title="${esc(item.orig)}">${esc(item.orig)}</span>
        </div>
        <div class="compare-arrow">↓</div>
        <div class="compare-row compare-after grade-${esc(item.grade)}">
          <span class="compare-label">검열 후</span>
          <span class="compare-val" title="${esc(item.replaced)}">${esc(item.replaced)}</span>
        </div>
      </div>
      ${item.count > 1 ? `<div class="det-loc">문서 내 ${item.count}회 탐지</div>` : ''}
      <div class="method-seg" data-idx="${idx}">
        <button type="button" class="${item.method==='mask'?'on-mask':''}" onclick="setMethod(${idx}, 'mask')">마스킹</button>
        <button type="button" class="${item.method==='substitute'?'on-sub':''}" onclick="setMethod(${idx}, 'substitute')">치환</button>
        <button type="button" class="${item.method==='publish'?'on-pub':''}" onclick="setMethod(${idx}, 'publish')">공개</button>
      </div>
      ${item.method === 'substitute' ? `
      <div class="sub-input-wrap">
        <input type="text" class="sub-input" value="${esc(item.replaced)}"
               placeholder="원하는 치환 표현 입력" oninput="setSubText(${idx}, this.value)">
      </div>` : ''}
    </div>
  `;
}

/* ── 요약 등급 칩 ── */
function renderSummaryGrades(items) {
  const counts = {"특급":0,"1급":0,"2급":0,"3급":0};
  Object.values(items).forEach(i => { if (counts[i.grade] !== undefined) counts[i.grade] += (i.count || 0); });
  const el = document.getElementById('summaryGrades');
  el.innerHTML = ITEM_GRADES
    .filter(g => counts[g] > 0)
    .map(g => `<span class="grade-chip grade-${g}">${g} ${counts[g]}개</span>`)
    .join('');
}

/* ── 인터랙션: 단어를 클릭했을 때만 탐지 패널을 표시 ── */
let selected = -1;
function selectItem(idx){
  if (selected === idx) { closeReviewPanel(); return; }
  showReviewForItem(idx);
}

function showReviewForItem(idx){
  const items = window.__items || {};
  if (!items[idx]) return;
  document.querySelectorAll('.ent.active, .det.active').forEach(e=>e.classList.remove('active'));
  selected = idx;
  document.querySelectorAll(`.ent[data-idx="${idx}"]`).forEach(e=>e.classList.add('active'));
  renderSingleItem(items[idx], idx);
  document.getElementById('reviewPanel').classList.add('open');
  document.getElementById('panelBackdrop').classList.add('open');
  collapseSummary();
}

/* 스크롤하거나 탐지 항목을 열어볼 때는 검열 완료 요약 스트립이 화면을 가리지 않도록 숨긴다 */
function collapseSummary(){
  document.getElementById('summaryStrip').classList.add('hidden');
}

/* 문서 맨 위로 다시 스크롤하면 검열 완료 요약 스트립을 다시 보여준다 */
function expandSummary(){
  document.getElementById('summaryStrip').classList.remove('hidden');
}

function handleScrollTop(scrollTop){
  if (scrollTop <= 0) expandSummary();
  else collapseSummary();
}

function closeReviewPanel(){
  document.querySelectorAll('.ent.active, .det.active').forEach(e=>e.classList.remove('active'));
  selected = -1;
  document.getElementById('reviewPanel').classList.remove('open');
  document.getElementById('panelBackdrop').classList.remove('open');
}

/* 문서 본문 내 해당 항목 토큰의 표시값/검열 방식을 현재 상태에 맞게 갱신한다 (방식이 바뀔 때마다 외형도 함께 바뀐다) */
function applyMethodToToken(idx, item){
  document.querySelectorAll(`.ent[data-idx="${idx}"]`).forEach(e=>{
    ITEM_GRADES.forEach(g => e.classList.remove('ent-' + g));
    e.classList.add('ent-' + item.grade);
    e.classList.toggle('allowed', item.method === 'publish');
    e.classList.toggle('mtd-sub', item.method === 'substitute');
    const maskSpan = e.querySelector('.ent-mask');
    if (maskSpan) maskSpan.textContent = item.replaced;
  });
}

/* 검열 방식(마스킹/치환/공개) 변경 — 방식과 등급은 1:1로 고정되어 있으므로 등급도 함께 갱신한다 */
function setMethod(idx, method){
  const items = window.__items || {};
  const item = items[idx];
  if (!item) return;
  if (item.subText === undefined) item.subText = item.replaced;
  item.method = method;
  item.grade = METHOD_GRADE[method] || item.grade;
  if (method === 'mask') item.replaced = MASK_TOKEN[item.type] || '[마스킹]';
  else if (method === 'publish') item.replaced = item.orig;
  else item.replaced = effectiveSubText(item);
  applyMethodToToken(idx, item);
  renderSingleItem(item, idx);
  renderSummaryGrades(items);
  syncCount();
}

/* 치환 방식에서 사용자가 직접 입력한 표현 적용 */
function setSubText(idx, val){
  const items = window.__items || {};
  const item = items[idx];
  if (!item) return;
  item.subText = val;
  item.replaced = val;
  const afterVal = document.querySelector(`.det[data-idx="${idx}"] .compare-after .compare-val`);
  if (afterVal) { afterVal.textContent = val; afterVal.title = val; }
  applyMethodToToken(idx, item);
  syncCount();
}

function syncCount(){
  document.getElementById('summaryMeta').innerHTML =
    `민감성 점수 <strong>{{ risk.score }}</strong>/100`;
}

/* ── 검열본 다운로드: 항목별 현재 검열 방식을 서버에 반영한 뒤 다운로드 ── */
function applyAndExport(){
  const items = window.__items || {};
  const ids = Object.keys(items);
  if (!ids.length) { window.location = `/download/${filename}_redacted.txt`; return; }
  const edits = ids.map(id => ({
    id: +id,
    replacement: items[id].replaced,
  }));
  fetch(`/apply_review/${encodeURIComponent(filename)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ edits }),
  })
    .then(r => r.json())
    .then(data => {
      if (!data.ok) { alert('적용 실패: ' + (data.error||'')); return; }
      window.location = `/download/${filename}_redacted.txt`;
    })
    .catch(() => alert('서버와 통신 중 오류가 발생했습니다.'));
}

/* ── 원문 대조 토글 ── */
document.getElementById('revealToggle').addEventListener('change', e => {
  document.body.classList.toggle('reveal', e.target.checked);
});

/* ── 문서 본문(데스크톱: 내부 스크롤) 또는 페이지(모바일: 자연 스크롤)를 스크롤하면
   검열 완료 요약 스트립을 자동으로 숨기고, 맨 위로 돌아오면 다시 보여준다 ── */
document.getElementById('docBody').addEventListener('scroll', e => {
  handleScrollTop(e.target.scrollTop);
}, { passive: true });
window.addEventListener('scroll', () => {
  handleScrollTop(window.scrollY);
}, { passive: true });

/* ══ 메인 실행 ══ */
(function run(){
  const docHtml = renderDocument(bodyText);
  document.getElementById('docBody').innerHTML = docHtml || '<div class="empty-state">문서 내용을 표시할 수 없습니다.</div>';
  Object.entries(items).forEach(([idx, item]) => {
    item.method = inferMethod(item);
    item.subText = item.replaced;
    if (item.method === 'mask') item.replaced = MASK_TOKEN[item.type] || '[마스킹]';
    else if (item.method === 'publish') item.replaced = item.orig;
    else item.replaced = effectiveSubText(item);
    applyMethodToToken(idx, item);
  });
  window.__items = items;
  renderSummaryGrades(items);
  syncCount();
})();

</script>
{% endif %}
</body>
</html>
