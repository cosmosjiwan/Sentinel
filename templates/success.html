<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>검열 완료 — Sentinal DLP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap');
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--accent:#1f6feb;
  --person:#f85149;--person-bg:rgba(248,81,73,.12);
  --org:#388bfd;--org-bg:rgba(56,139,253,.12);
  --ip:#d29922;--ip-bg:rgba(210,153,34,.12);
  --auth:#bc8cff;--auth-bg:rgba(188,140,255,.12);
  --secret:#3fb950;--secret-bg:rgba(63,185,80,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;
  font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:52px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;}
.brand{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:500;
  letter-spacing:.04em;color:var(--text);}
.brand span{color:var(--accent);}
.topbar-right{display:flex;gap:10px;align-items:center;}
.chip{font-size:11px;padding:3px 10px;border-radius:20px;
  font-family:'IBM Plex Mono',monospace;font-weight:500;
  background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.chip.danger{background:rgba(248,81,73,.15);border-color:var(--person);color:var(--person);}
.btn-dl{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;
  background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:500;
  cursor:pointer;text-decoration:none;font-family:'Noto Sans KR',sans-serif;transition:background .15s;}
.btn-dl:hover{background:#388bfd;}
.btn-home{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;
  background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;
  cursor:pointer;text-decoration:none;font-family:'Noto Sans KR',sans-serif;
  transition:border-color .15s,color .15s;}
.btn-home:hover{border-color:var(--text);color:var(--text);}

/* main */
.main{display:flex;flex:1;overflow:hidden;}

/* left */
.left-panel{flex:1;display:flex;flex-direction:column;
  border-right:1px solid var(--border);min-width:0;}
.panel-header{padding:10px 20px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-title{font-size:12px;font-weight:500;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;}
.restore-all-btn{font-size:11px;padding:3px 10px;border-radius:4px;
  background:transparent;border:1px solid var(--border);color:var(--muted);
  cursor:pointer;font-family:'IBM Plex Mono',monospace;
  transition:border-color .15s,color .15s,background .15s;}
.restore-all-btn:hover{border-color:var(--ip);color:var(--ip);}
.restore-all-btn.on{border-color:var(--ip);color:var(--ip);background:var(--ip-bg);}

.doc-scroll{flex:1;overflow-y:auto;padding:28px 32px;line-height:2.2;
  font-size:14px;color:#c9d1d9;}
.doc-scroll::-webkit-scrollbar{width:4px;}
.doc-scroll::-webkit-scrollbar-track{background:transparent;}
.doc-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* highlight spans */
.hl{padding:2px 5px;border-radius:3px;cursor:pointer;font-weight:500;
  transition:filter .1s;display:inline;}
.hl:hover{filter:brightness(1.3);}
.hl.active{outline:2px solid rgba(255,255,255,.7);outline-offset:1px;}
.hl.restored{text-decoration:line-through;opacity:.55;}
.orig-badge{display:inline-block;margin-left:5px;padding:1px 6px;border-radius:3px;
  font-size:.88em;font-weight:500;background:rgba(255,255,255,.08);
  color:var(--text);text-decoration:none;opacity:1;vertical-align:middle;}
.hl-person{background:var(--person-bg);color:var(--person);border-bottom:1.5px solid var(--person);}
.hl-org{background:var(--org-bg);color:var(--org);border-bottom:1.5px solid var(--org);}
.hl-ip{background:var(--ip-bg);color:var(--ip);border-bottom:1.5px solid var(--ip);}
.hl-auth{background:var(--auth-bg);color:var(--auth);border-bottom:1.5px solid var(--auth);}
.hl-secret{background:var(--secret-bg);color:var(--secret);border-bottom:1.5px solid var(--secret);}

/* legend */
.legend-bar{padding:10px 20px;background:var(--surface);
  border-top:1px solid var(--border);display:flex;gap:20px;flex-wrap:wrap;flex-shrink:0;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.leg-dot{width:7px;height:7px;border-radius:50%;}

/* right */
.right-panel{width:340px;flex-shrink:0;display:flex;flex-direction:column;}
.right-header{padding:10px 20px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:baseline;gap:8px;flex-shrink:0;}
.right-title{font-size:12px;font-weight:500;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;}
.count-badge{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;color:var(--person);}

.cards-scroll{flex:1;overflow-y:auto;padding:12px;}
.cards-scroll::-webkit-scrollbar{width:4px;}
.cards-scroll::-webkit-scrollbar-track{background:transparent;}
.cards-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.item-card{background:var(--surface);border:1px solid var(--border);
  border-radius:8px;margin-bottom:8px;overflow:hidden;
  transition:border-color .15s,background .15s;}
.item-card:hover{border-color:#444c56;background:var(--surface2);}
.item-card.active{border-color:var(--accent);background:var(--surface2);}
.item-card.restored-card{border-color:var(--ip);}

.card-head{padding:9px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.type-pip{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.orig-text{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;
  color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.type-tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;flex-shrink:0;}

.card-body{border-top:1px solid var(--border);padding:8px 14px 10px;}
.card-row{display:flex;align-items:flex-start;gap:8px;padding:3px 0;font-size:12px;}
.card-lbl{color:var(--muted);width:44px;flex-shrink:0;font-size:11px;}
.card-val{color:#c9d1d9;flex:1;}
.card-replaced{color:var(--secret);font-family:'IBM Plex Mono',monospace;font-size:11px;}
.card-reason{color:var(--muted);font-size:11px;line-height:1.5;}

.restore-btn{display:flex;align-items:center;gap:5px;margin-top:8px;
  padding:5px 10px;border-radius:5px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:11px;
  font-family:'IBM Plex Mono',monospace;cursor:pointer;width:100%;transition:all .15s;}
.restore-btn:hover{border-color:var(--ip);color:var(--ip);background:var(--ip-bg);}
.restore-btn.on{border-color:var(--ip);color:var(--ip);background:var(--ip-bg);}

/* stats */
.stats-bar{padding:10px 16px;background:var(--surface);
  border-top:1px solid var(--border);
  display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.stat{text-align:center;}
.stat-n{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:500;}
.stat-l{font-size:9px;color:var(--muted);margin-top:2px;}
.empty-state{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:200px;color:var(--muted);font-size:13px;gap:8px;}

/* 폴백 파싱 안내 배너 */
.fallback-banner{
  background:rgba(210,153,34,.12);border:1px solid var(--ip);
  color:var(--ip);font-size:11px;padding:6px 14px;border-radius:6px;
  margin:8px 12px 0;font-family:'IBM Plex Mono',monospace;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Sentinal<span>.</span>DLP</div>
  <div class="topbar-right">
    <span class="chip">문서 분석 완료</span>
    <span class="chip danger" id="totalChip">탐지 중...</span>
    <a class="btn-dl" href="/download/{{ filename }}">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/><path d="M7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.97a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.78a.749.749 0 1 1 1.06-1.06l1.97 1.97Z"/></svg>
      결과 다운로드
    </a>
    <a class="btn-home" href="/">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M6.906.664a1.749 1.749 0 0 1 2.187 0l5.25 4.2c.415.332.657.835.657 1.367v7.019A1.75 1.75 0 0 1 13.25 15h-3.5a.75.75 0 0 1-.75-.75V9H7v5.25a.75.75 0 0 1-.75.75h-3.5A1.75 1.75 0 0 1 1 13.25V6.23c0-.531.242-1.034.657-1.366l5.25-4.2Z"/></svg>
      새 문서 검열
    </a>
  </div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="panel-header">
      <span class="panel-title">검열 문서</span>
      <button class="restore-all-btn" id="restoreAllBtn" onclick="toggleRestoreAll()">전체 원문 보기</button>
    </div>
    <div class="doc-scroll" id="docArea"><div class="empty-state">파싱 중...</div></div>
    <div class="legend-bar">
      <div class="leg"><div class="leg-dot" style="background:var(--person)"></div>개인정보</div>
      <div class="leg"><div class="leg-dot" style="background:var(--org)"></div>기업/기관</div>
      <div class="leg"><div class="leg-dot" style="background:var(--ip)"></div>지적재산</div>
      <div class="leg"><div class="leg-dot" style="background:var(--auth)"></div>인증정보</div>
      <div class="leg"><div class="leg-dot" style="background:var(--secret)"></div>금융/기타</div>
    </div>
  </div>

  <div class="right-panel">
    <div class="right-header">
      <span class="right-title">탐지된 민감정보</span>
      <span class="count-badge" id="countBadge">—</span>
    </div>
    <div class="cards-scroll" id="cardsArea"><div class="empty-state">파싱 중...</div></div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-n" style="color:var(--person)" id="s-person">—</div><div class="stat-l">개인정보</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--org)"    id="s-org">—</div><div class="stat-l">기업/기관</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--ip)"     id="s-ip">—</div><div class="stat-l">지적재산</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--auth)"   id="s-auth">—</div><div class="stat-l">인증정보</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--secret)" id="s-secret">—</div><div class="stat-l">기타</div></div>
    </div>
  </div>
</div>

<script id="rawResult" type="text/plain">{{ result | e }}</script>
<script>
const raw = document.getElementById('rawResult').textContent;

/* ── 섹션 추출 ── */
function getSection(text, n) {
  const re = new RegExp(`###\\s*${n}[.\\s][\\s\\S]*?(?=###\\s*\\d|$)`, 'i');
  const m = text.match(re);
  return m ? m[0] : '';
}

/* ══════════════════════════════════════════════
   파서 A: @@REDACT|type|orig|replaced@@ 마커
══════════════════════════════════════════════ */
const MARKER_RE = /@@REDACT\|([^|@\n]+)\|([^|@\n]*(?:\\\|[^|@\n]*)*)\|([^@\n]*(?:\\\|[^@\n]*)*)@@/g;
function unescapePipe(s){ return s.replace(/\\\|/g,'|'); }

function parseMarkersFromText(docText) {
  const items = [], seen = {};
  let m; MARKER_RE.lastIndex = 0;
  while ((m = MARKER_RE.exec(docText)) !== null) {
    const type     = m[1].trim();
    const orig     = unescapePipe(m[2].trim());
    const replaced = unescapePipe(m[3].trim());
    const key = type+'|'+orig;
    if (seen[key] === undefined) {
      seen[key] = items.length;
      items.push({ type, orig, replaced, typeLabel: typeToLabel(type), count: 1, source:'marker' });
    } else { items[seen[key]].count++; }
  }
  return items;
}

function renderDocMarker(docText, items) {
  const keyToIdx = {};
  items.forEach((item,idx) => { keyToIdx[item.type+'|'+item.orig] = idx; });
  MARKER_RE.lastIndex = 0;
  let html = docText.replace(MARKER_RE, (match, type, rawOrig, rawRep) => {
    const orig     = unescapePipe(rawOrig.trim());
    const replaced = unescapePipe(rawRep.trim());
    const t = type.trim();
    const idx = keyToIdx[t+'|'+orig];
    return `<span class="hl hl-${esc(t)}" data-idx="${idx}" data-orig="${esc(orig)}" data-replaced="${esc(replaced)}" onclick="selectItem(${idx})">${esc(replaced)}</span>`;
  });
  return toParas(html);
}

/* ══════════════════════════════════════════════
   파서 B: <Rn>[치환값]</Rn> 폴백
   GPT가 프롬프트를 무시하고 XML 태그 형식을 쓸 때 처리
══════════════════════════════════════════════ */
const XML_TAG_RE = /<R(\d+)>([^<]*)<\/R\1>/g;

function parseMarkersFromXml(docText, sec2) {
  // sec2 테이블에서 원문 목록 파싱
  const tableItems = parseTableItems(sec2);
  const items = [];
  const tagMap = {}; // tagNum → item idx

  let m; XML_TAG_RE.lastIndex = 0;
  while ((m = XML_TAG_RE.exec(docText)) !== null) {
    const tagNum   = m[1];
    const replaced = m[2].trim();
    if (tagMap[tagNum] !== undefined) {
      items[tagMap[tagNum]].count++;
      continue;
    }
    // sec2 테이블에서 이 치환값에 대응하는 원문/유형 찾기
    const match = tableItems.find(t => t.replaced === replaced || t.replaced.includes(replaced) || replaced.includes(t.replaced));
    const orig     = match ? match.orig     : replaced;
    const type     = match ? match.type     : guessTypeFromReplaced(replaced);
    const reason   = match ? match.reason   : '';
    tagMap[tagNum] = items.length;
    items.push({ type, orig, replaced, typeLabel: typeToLabel(type), count: 1, reason, source:'xml' });
  }
  return items;
}

function renderDocXml(docText, items) {
  const tagToIdx = {};
  // 먼저 tagMap 재구성
  let m; XML_TAG_RE.lastIndex = 0; let counter = 0;
  const tagMap = {};
  while ((m = XML_TAG_RE.exec(docText)) !== null) {
    if (tagMap[m[1]] === undefined) { tagMap[m[1]] = counter++; }
  }
  // items 인덱스와 tagMap 동기화 (순서 기반)
  const tagNums = Object.keys(tagMap).sort((a,b) => +a - +b);
  tagNums.forEach((num, i) => { tagToIdx[num] = i; });

  XML_TAG_RE.lastIndex = 0;
  let html = docText.replace(XML_TAG_RE, (match, num, replaced) => {
    const idx = tagToIdx[num] !== undefined ? tagToIdx[num] : 0;
    const item = items[idx] || { type:'secret', orig: replaced };
    return `<span class="hl hl-${esc(item.type)}" data-idx="${idx}" data-orig="${esc(item.orig)}" data-replaced="${esc(replaced)}" onclick="selectItem(${idx})">${esc(replaced)}</span>`;
  });
  return toParas(html);
}

/* ── 테이블 파싱 (섹션 2) ── */
function parseTableItems(sec2) {
  const result = [];
  for (const line of sec2.split('\n')) {
    if (!line.includes('|')) continue;
    const cells = line.split('|').map(c=>c.trim()).filter(Boolean);
    if (cells.length < 2 || /유형|---/.test(cells[0])) continue;
    const [typeStr, orig, , reason] = cells;
    if (!orig || orig==='원문') continue;

    // 치환 결과 섹션에서 치환값 찾기
    result.push({ type: classifyType(typeStr), orig: orig.trim(), replaced: '', reason: (reason||'').trim() });
  }
  return result;
}

function parseReasonMap(sec2) {
  const map = {};
  for (const line of sec2.split('\n')) {
    if (!line.includes('|')) continue;
    const cells = line.split('|').map(c=>c.trim()).filter(Boolean);
    if (cells.length < 4 || /유형|---/.test(cells[0])) continue;
    const [, orig, , reason] = cells;
    if (orig && reason) map[orig] = reason;
  }
  return map;
}

function parseSummary(sec4) {
  const s = {};
  for (const l of sec4.split('\n')) {
    const num = l.match(/:\s*(\d+)/);
    if (!num) continue;
    if (/개인/i.test(l))       s.person = +num[1];
    if (/금융/i.test(l))       s.secret = +num[1];
    if (/인증/i.test(l))       s.auth   = +num[1];
    if (/기업|기밀/i.test(l))  s.org    = +num[1];
    if (/지적/i.test(l))       s.ip     = +num[1];
    if (/총.*탐지|탐지.*건/i.test(l)) s.total = +num[1];
  }
  return s;
}

/* ── 유형 분류 헬퍼 ── */
function classifyType(t) {
  t = t || '';
  if (/개인|이름|연락|전화|이메일|주민|생년/.test(t)) return 'person';
  if (/기업|기관|회사|대학|연구소|조직/.test(t))       return 'org';
  if (/지적|신약|후보|물질|프로젝트|알고|성능|수치|효능|제품|기술|특허/.test(t)) return 'ip';
  if (/인증|api|key|password|secret|token|access/i.test(t)) return 'auth';
  return 'secret';
}
function guessTypeFromReplaced(r) {
  if (/\[연락처\]|\[이메일\]|\[주민/.test(r)) return 'person';
  if (/\[API_KEY\]|\[PASSWORD\]|\[SECRET\]|\[ACCESS/.test(r)) return 'auth';
  if (/\[계좌\]|\[카드/.test(r)) return 'secret';
  if (/국내 기업|국내 대학|연구기관/.test(r)) return 'org';
  if (/연구개발|후보물질|개발 제품|핵심 알고/.test(r)) return 'ip';
  return 'person';
}
function typeToLabel(t) {
  return {person:'개인정보',org:'기업/기관',ip:'지적재산',auth:'인증정보',secret:'금융/기타'}[t]||'기타';
}
const TYPE_COLOR={person:'var(--person)',org:'var(--org)',ip:'var(--ip)',auth:'var(--auth)',secret:'var(--secret)'};
const TYPE_BG={person:'var(--person-bg)',org:'var(--org-bg)',ip:'var(--ip-bg)',auth:'var(--auth-bg)',secret:'var(--secret-bg)'};

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toParas(html) {
  // 마크다운 볼드 처리
  html = html.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  return html.split('\n').map(l=>l.trim()).filter(l=>l.length>0).map(l=>`<p>${l}</p>`).join('');
}

/* ── 카드 렌더링 ── */
function renderCards(items, reasonMap) {
  if (!items.length) return '<div class="empty-state">민감정보가 탐지되지 않았습니다.</div>';
  return items.map((item,idx) => {
    const color  = TYPE_COLOR[item.type]||TYPE_COLOR.secret;
    const bg     = TYPE_BG[item.type]||TYPE_BG.secret;
    const reason = item.reason || reasonMap[item.orig] || '';
    const cnt    = item.count>1?` <span style="font-size:10px;color:var(--muted)">×${item.count}</span>`:'';
    return `
    <div class="item-card" id="card-${idx}">
      <div class="card-head" onclick="selectItem(${idx})">
        <div class="type-pip" style="background:${color}"></div>
        <div class="orig-text">${esc(item.orig)}${cnt}</div>
        <span class="type-tag" style="background:${bg};color:${color}">${esc(item.typeLabel)}</span>
      </div>
      <div class="card-body">
        <div class="card-row">
          <span class="card-lbl">원문</span>
          <span class="card-val" style="font-family:'IBM Plex Mono',monospace;font-size:11px">${esc(item.orig)}</span>
        </div>
        <div class="card-row">
          <span class="card-lbl">치환</span>
          <span class="card-replaced">${esc(item.replaced)}</span>
        </div>
        ${reason?`<div class="card-row"><span class="card-lbl">근거</span><span class="card-reason">${esc(reason)}</span></div>`:''}
        <button class="restore-btn" id="rbtn-${idx}" onclick="toggleRestore(${idx},event)">
          <span id="rbtn-icon-${idx}">↪</span>
          <span id="rbtn-label-${idx}">원문으로 복원</span>
        </button>
      </div>
    </div>`;
  }).join('');
}

/* ── 인터랙션 ── */
let selected=-1, allRestored=false;
const restoredSet=new Set();

function selectItem(idx){
  if(selected>=0){
    document.querySelectorAll(`.hl[data-idx="${selected}"]`).forEach(e=>e.classList.remove('active'));
    document.getElementById(`card-${selected}`)?.classList.remove('active');
  }
  if(selected===idx){selected=-1;return;}
  selected=idx;
  document.querySelectorAll(`.hl[data-idx="${idx}"]`).forEach(e=>e.classList.add('active'));
  const card=document.getElementById(`card-${idx}`);
  if(card){card.classList.add('active');card.scrollIntoView({behavior:'smooth',block:'nearest'});}
}

function _setRestore(idx,on){
  const spans=document.querySelectorAll(`.hl[data-idx="${idx}"]`);
  const btn=document.getElementById(`rbtn-${idx}`);
  const lbl=document.getElementById(`rbtn-label-${idx}`);
  const icon=document.getElementById(`rbtn-icon-${idx}`);
  const card=document.getElementById(`card-${idx}`);
  if(on){
    restoredSet.add(idx);
    spans.forEach(s=>{
      s.classList.add('restored');
      if(!s.querySelector('.orig-badge')){
        const b=document.createElement('span');
        b.className='orig-badge';
        b.textContent=s.getAttribute('data-orig');
        s.appendChild(b);
      }
    });
    btn?.classList.add('on'); card?.classList.add('restored-card');
    if(lbl) lbl.textContent='검열값으로 되돌리기';
    if(icon) icon.textContent='↩';
  } else {
    restoredSet.delete(idx);
    spans.forEach(s=>{ s.classList.remove('restored'); s.querySelector('.orig-badge')?.remove(); });
    btn?.classList.remove('on'); card?.classList.remove('restored-card');
    if(lbl) lbl.textContent='원문으로 복원';
    if(icon) icon.textContent='↪';
  }
}

function toggleRestore(idx,e){
  e.stopPropagation();
  _setRestore(idx,!restoredSet.has(idx));
  _syncAllBtn();
}

function toggleRestoreAll(){
  const idxs=[...new Set([...document.querySelectorAll('.hl')].map(s=>+s.getAttribute('data-idx')))];
  if(!allRestored){ idxs.forEach(i=>_setRestore(i,true)); allRestored=true; }
  else            { idxs.forEach(i=>_setRestore(i,false)); allRestored=false; }
  _syncAllBtn();
}

function _syncAllBtn(){
  const idxs=[...new Set([...document.querySelectorAll('.hl')].map(s=>+s.getAttribute('data-idx')))];
  const everyOn=idxs.length>0&&idxs.every(i=>restoredSet.has(i));
  allRestored=everyOn;
  const btn=document.getElementById('restoreAllBtn');
  if(everyOn){ btn.classList.add('on'); btn.textContent='검열값으로 되돌리기'; }
  else       { btn.classList.remove('on'); btn.textContent='전체 원문 보기'; }
}

/* ══════════════════════════════════════════════
   메인 실행
══════════════════════════════════════════════ */
(function run(){
  const sec1 = getSection(raw,1).replace(/^###\s*1[.\s][^\n]*\n/,'').trim();
  const sec2 = getSection(raw,2);
  const sec4 = getSection(raw,4);
  const reasonMap = parseReasonMap(sec2);
  const summary   = parseSummary(sec4);

  // 파서 선택: @@REDACT 마커가 있으면 A, <Rn> 태그가 있으면 B
  const hasMarker = MARKER_RE.test(sec1); MARKER_RE.lastIndex=0;
  const hasXmlTag = XML_TAG_RE.test(sec1); XML_TAG_RE.lastIndex=0;

  let items, docHtml;

  if (hasMarker) {
    items   = parseMarkersFromText(sec1);
    docHtml = renderDocMarker(sec1, items);
  } else if (hasXmlTag) {
    // 폴백: XML 태그 형식
    items   = parseMarkersFromXml(sec1, sec2);
    docHtml = renderDocXml(sec1, items);
    // 폴백 사용 안내 배너
    document.getElementById('cardsArea').insertAdjacentHTML('beforebegin',
      '<div class="fallback-banner">⚠ GPT가 대체 형식으로 응답했습니다. 원문 복원 기능이 제한될 수 있습니다.</div>');
  } else {
    // 아무 마커도 없으면 원문 그대로 표시
    items   = [];
    docHtml = toParas(sec1 || raw.substring(0,3000));
  }

  document.getElementById('docArea').innerHTML   = docHtml || '<div class="empty-state">문서 내용을 표시할 수 없습니다.</div>';
  document.getElementById('cardsArea').innerHTML = renderCards(items, reasonMap);

  const total = summary.total || items.length;
  document.getElementById('countBadge').textContent = total+'건';
  document.getElementById('totalChip').textContent  = '민감정보 '+total+'건 탐지';
  if(total>0) document.getElementById('totalChip').classList.add('danger');

  const cnt={person:0,org:0,ip:0,auth:0,secret:0};
  items.forEach(i=>{ if(cnt[i.type]!==undefined) cnt[i.type]+=i.count; });
  ['person','org','ip','auth','secret'].forEach(k=>{
    const el=document.getElementById('s-'+k);
    if(el) el.textContent=summary[k]!==undefined?summary[k]:cnt[k];
  });
})();
</script>
